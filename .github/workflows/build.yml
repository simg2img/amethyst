name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: main

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: aarch64-unknown-linux-gnu

      - name: Install aarch64 cross-compiler
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu

      - name: Build release
        run: cargo build --target aarch64-unknown-linux-gnu --release

      - name: Package Magisk module
        shell: bash
        working-directory: ${{ github.workspace }}
        env:
          CI_RUN: ${{ github.run_number }}
          CI_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          SHORT_SHA="${CI_SHA:0:7}"

          BASE_VER="$(grep '^version=' module/module.prop | cut -d= -f2)"
          BASE_VCODE="$(grep '^versionCode=' module/module.prop | cut -d= -f2)"

          NEW_VER="${BASE_VER} (${CI_RUN}-${SHORT_SHA}-release)"
          NEW_VCODE="${BASE_VCODE}${CI_RUN}"

          mkdir -p output/lib
          sed "s/^version=.*/version=${NEW_VER}/; s/^versionCode=.*/versionCode=${NEW_VCODE}/" \
            module/module.prop > output/module.prop
          cp module/customize.sh output/
          cp module/service.sh output/
          cp main/target/aarch64-unknown-linux-gnu/release/daemon output/lib/

          ZIP_NAME="Amethyst-Thermal-v${BASE_VER}+${BASE_VCODE}.zip"
          (cd output && zip -9 -r "../${ZIP_NAME}" .)

          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Upload module artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.zip_name }}
          path: ${{ github.workspace }}/${{ env.zip_name }}
          if-no-files-found: error
          compression-level: 0

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: daemon-aarch64
          path: main/target/aarch64-unknown-linux-gnu/release/daemon
          if-no-files-found: error
